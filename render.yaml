services:
  # ─────────────────────────────────────────────────────────────
  # 1. Face Recognition Service  (Python / Flask / Gunicorn)
  #    Deploy this FIRST so you have its URL for the API server.
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: face-service
    runtime: python
    rootDir: artifacts/face-service
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn
      --workers 2
      --worker-class gthread
      --threads 2
      --bind 0.0.0.0:$PORT
      --timeout 300
      --preload
      wsgi:application
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    # Recommended plan: "standard" (512 MB RAM minimum for InsightFace model)
    # Free plan may run out of memory — upgrade if you see OOM errors.

  # ─────────────────────────────────────────────────────────────
  # 2. API Server  (Node.js / Express)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: face-search-api
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to the URL of your deployed face-service above, e.g.:
      # https://face-service.onrender.com
      - key: FACE_SERVICE_URL
        sync: false
      # Comma-separated list of allowed frontend origins, e.g.:
      # https://face-search-frontend.onrender.com,https://yourdomain.com
      # Leave blank to allow all origins.
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  # ─────────────────────────────────────────────────────────────
  # 3. Frontend  (React / Vite → Static Site)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: face-search-frontend
    runtime: static
    buildCommand: >
      npm install -g pnpm &&
      pnpm install &&
      pnpm --filter @workspace/face-search run build
    staticPublishPath: artifacts/face-search/dist/public
    envVars:
      # Set this to your deployed API server URL, e.g.:
      # https://face-search-api.onrender.com
      - key: VITE_API_BASE
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
