kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "PORT=8080 FACE_SERVICE_PORT=5000 node --enable-source-maps artifacts/api-server/dist/index.mjs"

[services.production]

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/api-server run build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["sh", "artifacts/api-server/start-prod.sh"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"
FACE_SERVICE_PORT = "5000"

[services.production.health.startup]
path = "/api/healthz"
